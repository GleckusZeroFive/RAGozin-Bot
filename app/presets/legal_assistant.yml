messages:
  start: "Здравствуйте, <b>{user_name}</b>. Я — <b>{bot_name}</b>, ассистент по юридическим\
    \ документам.\n\nЗагрузите договоры, контракты, акты или другие документы — я помогу\
    \ найти нужные пункты, статьи и условия. Поддерживаю PDF, DOCX, TXT, MD, включая\
    \ сканированные документы (OCR).\n\n/help — все команды\n/about — о боте"
  help: "<b>Команды:</b>\n{commands_help}\n\n<b>Загрузка документов:</b>\nОтправьте\
    \ файл (PDF, DOCX, TXT, MD) — я его проиндексирую.\nПоддерживаются сканированные\
    \ документы — OCR распознает текст автоматически.\n\n<b>Вопросы:</b>\nОтправьте\
    \ текстовое сообщение — я поищу ответ в загруженных документах.\nМожно спрашивать\
    \ о сроках, суммах, обязательствах, ответственности, условиях оплаты и других положениях\
    \ договоров.\nУточняющие вопросы учитывают контекст диалога.\n\n<b>Голосовые сообщения:</b>\n\
    Отправьте голосовое — я распознаю речь и поищу ответ."
  about: "<b>{bot_name} — AI-ассистент по юридическим документам</b>\n\nЗагружайте\
    \ договоры, контракты, акты, счета и другие юридические документы — бот поможет\
    \ быстро найти нужные пункты, статьи, условия и обязательства сторон.\n\n<b>Возможности:</b>\n\
    • Поиск по конкретным пунктам и статьям договоров\n• Анализ условий, сроков, сумм,\
    \ ответственности\n• OCR — распознавание сканированных документов\n• Поддержка PDF,\
    \ DOCX, TXT, MD\n• Голосовые сообщения\n• Контекстный диалог с памятью\n• Изоляция\
    \ данных между пользователями"
features:
  law_search: false
  voice: true
  ocr: true
commands:
  items:
    start: Начать работу с ботом
    help: Справка по командам
    docs: Загруженные документы
    update: Обновить документ
    delete: Удалить документ
    stats: Статистика и лимиты
    reset: Удалить все документы
    activate: Активировать ключ доступа
    new: Сбросить контекст диалога
    about: О боте
  short: /docs, /stats, /new, /help
